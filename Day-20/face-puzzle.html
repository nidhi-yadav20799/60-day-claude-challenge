<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Face Puzzle Game</title>
<style>
  :root{
    --bg1:#1e1b4b;
    --bg2:#4c1d95;
    --accent:#a78bfa;
    --accent2:#22c55e;
    --card:#ffffff0d;
    --border:#ffffff22;
    --text:#f5f3ff;
    --muted:#c4b5fd;
    --danger:#ef4444;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Segoe UI', system-ui, -apple-system, Roboto, Arial, sans-serif;
    background:radial-gradient(circle at 20% 20%, var(--bg2), var(--bg1) 60%);
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 12px 60px;
  }
  h1{
    font-size:clamp(1.4rem,4vw,2.2rem);
    margin:6px 0 4px;
    background:linear-gradient(90deg,#f0abfc,#a78bfa,#60a5fa);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-align:center;
  }
  .subtitle{
    color:var(--muted);
    margin-bottom:20px;
    text-align:center;
    font-size:0.95rem;
  }
  .panel{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:20px;
    width:100%;
    max-width:640px;
    backdrop-filter:blur(10px);
    box-shadow:0 8px 32px #00000040;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
    margin-bottom:20px;
  }
  video, canvas.snapshot{
    width:100%;
    max-width:480px;
    border-radius:14px;
    background:#000;
    border:2px solid var(--border);
  }
  video{ transform:scaleX(-1); }
  .btn-row{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
  }
  button{
    font-family:inherit;
    font-size:0.95rem;
    font-weight:600;
    padding:10px 20px;
    border-radius:10px;
    border:none;
    cursor:pointer;
    background:linear-gradient(135deg,#8b5cf6,#6d28d9);
    color:white;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow:0 4px 14px #8b5cf655;
  }
  button:hover{ transform:translateY(-2px); box-shadow:0 6px 18px #8b5cf680; }
  button:active{ transform:translateY(0); }
  button.secondary{
    background:linear-gradient(135deg,#374151,#1f2937);
    box-shadow:0 4px 14px #00000040;
  }
  button.success{
    background:linear-gradient(135deg,#22c55e,#15803d);
    box-shadow:0 4px 14px #22c55e55;
  }
  button:disabled{
    opacity:0.45;
    cursor:not-allowed;
    transform:none;
  }
  .diff-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  .diff-btn{
    background:#ffffff10;
    border:2px solid var(--border);
    box-shadow:none;
    color:var(--text);
  }
  .diff-btn.selected{
    border-color:var(--accent);
    background:#8b5cf633;
  }
  .status-bar{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    justify-content:center;
    width:100%;
    max-width:640px;
    margin-bottom:14px;
  }
  .stat{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:8px 16px;
    text-align:center;
    min-width:100px;
  }
  .stat .label{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--muted);
    display:block;
  }
  .stat .value{
    font-size:1.2rem;
    font-weight:700;
  }
  #puzzleWrap{
    position:relative;
    width:100%;
    max-width:480px;
    aspect-ratio:1/1;
    margin:0 auto;
    border-radius:14px;
    overflow:visible;
    background:repeating-conic-gradient(#00000022 0% 25%, #ffffff11 0% 50%) 50% / 20px 20px;
    border:2px solid var(--border);
    touch-action:none;
    user-select:none;
  }
  .piece{
    position:absolute;
    background-size:cover;
    border-radius:6px;
    box-shadow:0 2px 6px #00000055;
    cursor:grab;
    transition:box-shadow .15s ease, border-color .15s ease;
    border:2px solid #ffffff33;
    touch-action:none;
  }
  .piece.dragging{
    cursor:grabbing;
    z-index:50;
    border-color:#fbbf24 !important;
    box-shadow:0 8px 20px #00000080;
  }
  .piece.correct{
    border-color:var(--accent2) !important;
  }
  #hiddenCanvas{ display:none; }
  .hidden{ display:none !important; }
  .overlay{
    position:fixed;
    inset:0;
    background:#000000cc;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:200;
    padding:16px;
  }
  .overlay .box{
    background:#1e1b4bee;
    border:1px solid var(--border);
    border-radius:18px;
    padding:30px;
    max-width:420px;
    width:100%;
    text-align:center;
    box-shadow:0 10px 40px #00000080;
  }
  .overlay h2{
    margin-top:0;
    font-size:1.6rem;
    background:linear-gradient(90deg,#facc15,#f97316);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .result-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin:18px 0;
  }
  .result-grid div{
    background:#ffffff10;
    padding:10px;
    border-radius:10px;
  }
  .result-grid .label{ font-size:0.75rem; color:var(--muted); display:block; }
  .result-grid .val{ font-size:1.1rem; font-weight:700; }
  table.leaderboard{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
    font-size:0.85rem;
  }
  table.leaderboard th, table.leaderboard td{
    padding:6px 8px;
    border-bottom:1px solid var(--border);
    text-align:left;
  }
  table.leaderboard th{ color:var(--muted); font-weight:600; }
  .error-box{
    background:#7f1d1d55;
    border:1px solid var(--danger);
    color:#fecaca;
    padding:14px;
    border-radius:12px;
    max-width:480px;
    text-align:center;
  }
  .section-title{
    font-size:0.85rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--muted);
    margin:6px 0 0;
  }
  footer{
    color:var(--muted);
    font-size:0.75rem;
    margin-top:10px;
    text-align:center;
  }
  @media (max-width:480px){
    .panel{ padding:14px; border-radius:14px; }
    .stat{ min-width:80px; padding:6px 10px; }
  }
</style>
</head>
<body>

<h1>🧩 Face Puzzle Game</h1>
<div class="subtitle">Snap a selfie, scramble it, and put your face back together!</div>

<!-- STEP 1: CAMERA -->
<div class="panel" id="cameraPanel">
  <div class="section-title">Step 1 — Camera</div>
  <video id="video" autoplay playsinline muted></video>
  <div id="cameraError" class="error-box hidden"></div>
  <div class="btn-row">
    <button id="startCameraBtn">Enable Camera</button>
    <button id="takePhotoBtn" class="secondary" disabled>Take Photo</button>
  </div>
</div>

<!-- STEP 2: PREVIEW + DIFFICULTY -->
<div class="panel hidden" id="previewPanel">
  <div class="section-title">Step 2 — Your Photo</div>
  <canvas class="snapshot" id="snapshotCanvas"></canvas>
  <div class="section-title">Choose difficulty</div>
  <div class="diff-row">
    <button class="diff-btn" data-size="3">3 × 3 (Easy)</button>
    <button class="diff-btn" data-size="4">4 × 4 (Medium)</button>
    <button class="diff-btn" data-size="5">5 × 5 (Hard)</button>
  </div>
  <div class="btn-row">
    <button id="retakeBtn" class="secondary">Retake Photo</button>
    <button id="startPuzzleBtn" disabled>Start Puzzle</button>
  </div>
</div>

<!-- STEP 3: PUZZLE -->
<div class="hidden" id="gamePanel" style="width:100%;display:flex;flex-direction:column;align-items:center;">
  <div class="status-bar">
    <div class="stat"><span class="label">Time</span><span class="value" id="timerDisplay">00:00.0</span></div>
    <div class="stat"><span class="label">Moves</span><span class="value" id="movesDisplay">0</span></div>
    <div class="stat"><span class="label">Placed</span><span class="value" id="placedDisplay">0/0</span></div>
    <div class="stat"><span class="label">Difficulty</span><span class="value" id="diffDisplay">-</span></div>
  </div>
  <div id="puzzleWrap"></div>
  <div class="btn-row" style="margin-top:16px;">
    <button id="newPhotoBtn" class="secondary">New Photo</button>
    <button id="shuffleAgainBtn" class="secondary">Reshuffle</button>
  </div>
</div>

<canvas id="hiddenCanvas"></canvas>

<footer>Runs 100% locally in your browser. No photos are uploaded anywhere.</footer>

<script>
(function(){
  "use strict";

  // ---------- Element refs ----------
  const video = document.getElementById('video');
  const cameraPanel = document.getElementById('cameraPanel');
  const cameraError = document.getElementById('cameraError');
  const startCameraBtn = document.getElementById('startCameraBtn');
  const takePhotoBtn = document.getElementById('takePhotoBtn');

  const previewPanel = document.getElementById('previewPanel');
  const snapshotCanvas = document.getElementById('snapshotCanvas');
  const retakeBtn = document.getElementById('retakeBtn');
  const startPuzzleBtn = document.getElementById('startPuzzleBtn');
  const diffButtons = document.querySelectorAll('.diff-btn');

  const gamePanel = document.getElementById('gamePanel');
  const puzzleWrap = document.getElementById('puzzleWrap');
  const timerDisplay = document.getElementById('timerDisplay');
  const movesDisplay = document.getElementById('movesDisplay');
  const placedDisplay = document.getElementById('placedDisplay');
  const diffDisplay = document.getElementById('diffDisplay');
  const newPhotoBtn = document.getElementById('newPhotoBtn');
  const shuffleAgainBtn = document.getElementById('shuffleAgainBtn');

  const hiddenCanvas = document.getElementById('hiddenCanvas');

  // ---------- State ----------
  let stream = null;
  let gridSize = 3;
  let capturedDataURL = null;
  let pieceURLs = []; // dataURLs sliced by correct index
  let pieces = []; // {el, correctIndex, currentCell}
  let cellSize = 0;
  let boardPx = 480;
  let moves = 0;
  let timerInterval = null;
  let startTime = 0;
  let elapsedMs = 0;
  let gameActive = false;
  let dragState = null;

  const LB_KEY = 'facePuzzleLeaderboard_v1';

  // ---------- Camera ----------
  function showCameraError(msg){
    cameraError.textContent = msg;
    cameraError.classList.remove('hidden');
  }

  startCameraBtn.addEventListener('click', async () => {
    cameraError.classList.add('hidden');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showCameraError('Your browser does not support camera access (getUserMedia). Please try a modern browser like Chrome, Firefox, or Safari over HTTPS.');
      return;
    }
    startCameraBtn.disabled = true;
    startCameraBtn.textContent = 'Requesting...';
    try{
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width:{ideal:720}, height:{ideal:720} },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      takePhotoBtn.disabled = false;
      startCameraBtn.textContent = 'Camera Enabled';
    }catch(err){
      startCameraBtn.disabled = false;
      startCameraBtn.textContent = 'Enable Camera';
      if(err && err.name === 'NotAllowedError'){
        showCameraError('Camera permission was denied. Please allow camera access in your browser settings and click "Enable Camera" again.');
      } else if(err && err.name === 'NotFoundError'){
        showCameraError('No camera device was found on this system.');
      } else {
        showCameraError('Could not access camera: ' + (err && err.message ? err.message : 'Unknown error') + '. Make sure you are on HTTPS or localhost.');
      }
    }
  });

  takePhotoBtn.addEventListener('click', () => {
    const size = Math.min(video.videoWidth, video.videoHeight) || 480;
    hiddenCanvas.width = size;
    hiddenCanvas.height = size;
    const ctx = hiddenCanvas.getContext('2d');
    const sx = (video.videoWidth - size)/2;
    const sy = (video.videoHeight - size)/2;
    // Mirror the image horizontally to match the preview (selfie view)
    ctx.save();
    ctx.translate(size, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
    ctx.restore();
    capturedDataURL = hiddenCanvas.toDataURL('image/png');

    snapshotCanvas.width = size;
    snapshotCanvas.height = size;
    const sctx = snapshotCanvas.getContext('2d');
    const img = new Image();
    img.onload = () => sctx.drawImage(img, 0, 0, size, size);
    img.src = capturedDataURL;

    stopCameraStream();
    cameraPanel.classList.add('hidden');
    previewPanel.classList.remove('hidden');
  });

  function stopCameraStream(){
    if(stream){
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
  }

  retakeBtn.addEventListener('click', () => {
    previewPanel.classList.add('hidden');
    cameraPanel.classList.remove('hidden');
    startCameraBtn.disabled = false;
    startCameraBtn.textContent = 'Enable Camera';
    takePhotoBtn.disabled = true;
    diffButtons.forEach(b => b.classList.remove('selected'));
    startPuzzleBtn.disabled = true;
  });

  newPhotoBtn.addEventListener('click', () => {
    endGameCleanup();
    gamePanel.classList.add('hidden');
    cameraPanel.classList.remove('hidden');
    startCameraBtn.disabled = false;
    startCameraBtn.textContent = 'Enable Camera';
    takePhotoBtn.disabled = true;
    diffButtons.forEach(b => b.classList.remove('selected'));
    startPuzzleBtn.disabled = true;
  });

  // ---------- Difficulty selection ----------
  diffButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      diffButtons.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      gridSize = parseInt(btn.dataset.size, 10);
      startPuzzleBtn.disabled = false;
    });
  });

  startPuzzleBtn.addEventListener('click', () => {
    previewPanel.classList.add('hidden');
    gamePanel.classList.remove('hidden');
    buildPuzzle();
  });

  shuffleAgainBtn.addEventListener('click', () => {
    buildPuzzle();
  });

  // ---------- Puzzle slicing ----------
  function sliceImage(callback){
    const img = new Image();
    img.onload = () => {
      const total = gridSize * gridSize;
      const srcSize = img.width; // square
      const pieceSrc = srcSize / gridSize;
      const urls = [];
      for(let row = 0; row < gridSize; row++){
        for(let col = 0; col < gridSize; col++){
          const c = document.createElement('canvas');
          c.width = pieceSrc;
          c.height = pieceSrc;
          const ctx = c.getContext('2d');
          ctx.drawImage(img, col*pieceSrc, row*pieceSrc, pieceSrc, pieceSrc, 0, 0, pieceSrc, pieceSrc);
          urls.push(c.toDataURL('image/png'));
        }
      }
      callback(urls);
    };
    img.src = capturedDataURL;
  }

  // ---------- Solvability-guaranteed shuffle ----------
  // We treat this as a sliding arrangement of labeled tiles (no blank),
  // and shuffle by generating a random permutation, then fixing parity
  // if needed by swapping two pieces (always solvable since any permutation
  // is achievable in this "swap any two" puzzle type - freeform drag & drop,
  // not slide puzzle, so every permutation is trivially solvable).
  function generateScramble(total){
    const arr = Array.from({length: total}, (_, i) => i);
    // Fisher-Yates
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    // Ensure not already fully solved (avoid trivial instant-win)
    let identity = arr.every((v, i) => v === i);
    if(identity){
      // swap first two
      [arr[0], arr[1]] = [arr[1], arr[0]];
    }
    return arr; // arr[cellIndex] = correctIndex of piece placed there
  }

  // ---------- Build / render puzzle ----------
  function buildPuzzle(){
    endGameCleanup();
    puzzleWrap.innerHTML = '';
    pieces = [];
    moves = 0;
    elapsedMs = 0;
    updateMoves();
    updateTimerDisplay();
    diffDisplay.textContent = gridSize + '×' + gridSize;

    boardPx = Math.min(puzzleWrap.clientWidth || 480, 480);
    cellSize = boardPx / gridSize;
    puzzleWrap.style.height = boardPx + 'px';

    sliceImage((urls) => {
      pieceURLs = urls;
      const total = gridSize * gridSize;
      const scramble = generateScramble(total); // scramble[cell] = correctIndex

      for(let cell = 0; cell < total; cell++){
        const correctIndex = scramble[cell];
        const el = document.createElement('div');
        el.className = 'piece';
        el.style.width = cellSize + 'px';
        el.style.height = cellSize + 'px';
        el.style.backgroundImage = `url(${pieceURLs[correctIndex]})`;
        const pos = cellToXY(cell);
        el.style.left = pos.x + 'px';
        el.style.top = pos.y + 'px';
        el.dataset.correctIndex = correctIndex;
        el.dataset.cell = cell;

        attachDragHandlers(el);
        puzzleWrap.appendChild(el);
        pieces.push({ el, correctIndex, cell });
      }
      updatePlacedCount();
      startTimer();
      gameActive = true;
    });
  }

  function cellToXY(cellIndex){
    const row = Math.floor(cellIndex / gridSize);
    const col = cellIndex % gridSize;
    return { x: col * cellSize, y: row * cellSize };
  }

  function xyToCell(x, y){
    let col = Math.round(x / cellSize);
    let row = Math.round(y / cellSize);
    col = Math.max(0, Math.min(gridSize - 1, col));
    row = Math.max(0, Math.min(gridSize - 1, row));
    return row * gridSize + col;
  }

  // ---------- Drag & Touch handling ----------
  function attachDragHandlers(el){
    el.addEventListener('mousedown', onDragStart);
    el.addEventListener('touchstart', onDragStart, { passive:false });
  }

  function onDragStart(e){
    if(!gameActive) return;
    e.preventDefault();
    const el = e.currentTarget;
    const wrapRect = puzzleWrap.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    const elRect = el.getBoundingClientRect();

    dragState = {
      el,
      offsetX: point.clientX - elRect.left,
      offsetY: point.clientY - elRect.top,
      wrapRect
    };
    el.classList.add('dragging');
    el.style.zIndex = 50;

    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('touchmove', onDragMove, { passive:false });
    document.addEventListener('mouseup', onDragEnd);
    document.addEventListener('touchend', onDragEnd);
  }

  function onDragMove(e){
    if(!dragState) return;
    e.preventDefault();
    const point = e.touches ? e.touches[0] : e;
    const wrapRect = puzzleWrap.getBoundingClientRect();
    let x = point.clientX - wrapRect.left - dragState.offsetX;
    let y = point.clientY - wrapRect.top - dragState.offsetY;
    x = Math.max(-cellSize*0.4, Math.min(boardPx - cellSize*0.6, x));
    y = Math.max(-cellSize*0.4, Math.min(boardPx - cellSize*0.6, y));
    dragState.el.style.left = x + 'px';
    dragState.el.style.top = y + 'px';
  }

  function onDragEnd(e){
    if(!dragState) return;
    const el = dragState.el;
    el.classList.remove('dragging');
    el.style.zIndex = '';

    const curLeft = parseFloat(el.style.left);
    const curTop = parseFloat(el.style.top);
    const centerX = curLeft + cellSize/2;
    const centerY = curTop + cellSize/2;
    const targetCell = xyToCell(centerX, centerY);

    const draggedPiece = pieces.find(p => p.el === el);
    const occupant = pieces.find(p => p.cell === targetCell && p !== draggedPiece);

    if(occupant && occupant !== draggedPiece){
      // swap positions
      const oldCell = draggedPiece.cell;
      draggedPiece.cell = targetCell;
      occupant.cell = oldCell;
      const posA = cellToXY(draggedPiece.cell);
      const posB = cellToXY(occupant.cell);
      draggedPiece.el.style.left = posA.x + 'px';
      draggedPiece.el.style.top = posA.y + 'px';
      occupant.el.style.left = posB.x + 'px';
      occupant.el.style.top = posB.y + 'px';
      moves++;
      updateMoves();
    } else {
      // snap back to grid (either same cell, or empty landing - shouldn't happen since all cells occupied)
      const pos = cellToXY(draggedPiece.cell);
      el.style.left = pos.x + 'px';
      el.style.top = pos.y + 'px';
    }

    document.removeEventListener('mousemove', onDragMove);
    document.removeEventListener('touchmove', onDragMove);
    document.removeEventListener('mouseup', onDragEnd);
    document.removeEventListener('touchend', onDragEnd);
    dragState = null;

    updatePlacedCount();
    checkWin();
  }

  function updatePlacedCount(){
    let correct = 0;
    pieces.forEach(p => {
      if(p.cell === p.correctIndex){
        p.el.classList.add('correct');
        correct++;
      } else {
        p.el.classList.remove('correct');
      }
    });
    placedDisplay.textContent = correct + '/' + pieces.length;
    return correct;
  }

  function updateMoves(){
    movesDisplay.textContent = moves;
  }

  // ---------- Timer ----------
  function startTimer(){
    startTime = Date.now();
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      elapsedMs = Date.now() - startTime;
      updateTimerDisplay();
    }, 100);
  }

  function stopTimer(){
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function updateTimerDisplay(){
    const totalTenths = Math.floor(elapsedMs / 100);
    const mins = Math.floor(totalTenths / 600);
    const secs = Math.floor((totalTenths % 600) / 10);
    const tenths = totalTenths % 10;
    timerDisplay.textContent =
      String(mins).padStart(2,'0') + ':' +
      String(secs).padStart(2,'0') + '.' + tenths;
  }

  function endGameCleanup(){
    stopTimer();
    gameActive = false;
  }

  // ---------- Win detection ----------
  function checkWin(){
    const correct = updatePlacedCount();
    if(correct === pieces.length && pieces.length > 0){
      gameActive = false;
      stopTimer();
      showWinOverlay();
    }
  }

  // ---------- Leaderboard ----------
  function loadLeaderboard(){
    try{
      const raw = localStorage.getItem(LB_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }

  function saveLeaderboard(list){
    try{
      localStorage.setItem(LB_KEY, JSON.stringify(list));
    }catch(e){ /* storage unavailable, ignore */ }
  }

  function addResultToLeaderboard(entry){
    let list = loadLeaderboard();
    list.push(entry);
    list.sort((a,b) => a.timeMs - b.timeMs);
    list = list.slice(0, 5);
    saveLeaderboard(list);
    return list;
  }

  function formatTime(ms){
    const totalTenths = Math.floor(ms / 100);
    const mins = Math.floor(totalTenths / 600);
    const secs = Math.floor((totalTenths % 600) / 10);
    const tenths = totalTenths % 10;
    return String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0') + '.' + tenths;
  }

  function showWinOverlay(){
    const entry = {
      date: new Date().toLocaleDateString(),
      timeMs: elapsedMs,
      moves: moves,
      difficulty: gridSize + '×' + gridSize
    };
    const board = addResultToLeaderboard(entry);

    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    const box = document.createElement('div');
    box.className = 'box';

    box.innerHTML = `
      <h2>🎉 Puzzle Solved!</h2>
      <div class="result-grid">
        <div><span class="label">Final Time</span><span class="val">${formatTime(elapsedMs)}</span></div>
        <div><span class="label">Moves</span><span class="val">${moves}</span></div>
        <div><span class="label">Difficulty</span><span class="val">${gridSize}×${gridSize}</span></div>
        <div><span class="label">Date</span><span class="val">${entry.date}</span></div>
      </div>
      <div class="section-title" style="margin-bottom:6px;">Top 5 Best Times</div>
      <table class="leaderboard">
        <thead><tr><th>#</th><th>Time</th><th>Moves</th><th>Diff</th><th>Date</th></tr></thead>
        <tbody>
          ${board.map((b,i) => `
            <tr>
              <td>${i+1}</td>
              <td>${formatTime(b.timeMs)}</td>
              <td>${b.moves}</td>
              <td>${b.difficulty}</td>
              <td>${b.date}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      <div class="btn-row" style="margin-top:20px;">
        <button id="playAgainBtn" class="success">Play Again</button>
        <button id="overlayNewPhotoBtn" class="secondary">New Photo</button>
      </div>
    `;
    overlay.appendChild(box);
    document.body.appendChild(overlay);

    box.querySelector('#playAgainBtn').addEventListener('click', () => {
      document.body.removeChild(overlay);
      buildPuzzle();
    });
    box.querySelector('#overlayNewPhotoBtn').addEventListener('click', () => {
      document.body.removeChild(overlay);
      newPhotoBtn.click();
    });
  }

  // ---------- Resize handling ----------
  window.addEventListener('resize', () => {
    if(pieces.length === 0) return;
    const newBoardPx = Math.min(puzzleWrap.clientWidth || 480, 480);
    if(Math.abs(newBoardPx - boardPx) < 1) return;
    boardPx = newBoardPx;
    cellSize = boardPx / gridSize;
    puzzleWrap.style.height = boardPx + 'px';
    pieces.forEach(p => {
      p.el.style.width = cellSize + 'px';
      p.el.style.height = cellSize + 'px';
      const pos = cellToXY(p.cell);
      p.el.style.left = pos.x + 'px';
      p.el.style.top = pos.y + 'px';
    });
  });

})();
</script>
</body>
</html>
